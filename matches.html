<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Matches - SkillBridge</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="dashboard.html">SkillBridge</a></h1>
            </div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="skills.html">My Skills</a>
                <a href="matches.html">Matches</a>
                <a href="exchanges.html">Exchanges</a>
                <a href="profile.html">Profile</a>
                <a href="#" id="logoutBtn" class="btn-secondary">Logout</a>
            </div>
        </div>
    </nav>

    <section class="matches-section">
        <div class="container">
            <h1>Your Skill Matches</h1>
            <p class="section-subtitle">Connect with people who have complementary skills</p>

            <div id="matchesContainer" class="matches-container">
                <p class="empty-state">Loading matches...</p>
            </div>
        </div>
    </section>

    <div id="exchangeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Send Exchange Request</h2>
            <form id="exchangeForm">
                <input type="hidden" id="partnerId" name="partnerId">
                <input type="hidden" id="skillGivenId" name="skillGivenId">
                <input type="hidden" id="skillReceivedId" name="skillReceivedId">

                <div class="exchange-summary" id="exchangeSummary"></div>

                <div class="form-group">
                    <label for="message">Message (Optional)</label>
                    <textarea id="message" name="message" rows="4"
                              placeholder="Introduce yourself and explain your interest..."></textarea>
                </div>

                <div id="modalError" class="error-message"></div>

                <button type="submit" class="btn-primary">Send Request</button>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/matches.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SkillBridge</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1><a href="dashboard.html">SkillBridge</a></h1>
            </div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="skills.html">My Skills</a>
                <a href="matches.html">Matches</a>
                <a href="exchanges.html">Exchanges</a>
                <a href="profile.html">Profile</a>
                <a href="#" id="logoutBtn" class="btn-secondary">Logout</a>
            </div>
        </div>
    </nav>

    <section class="profile-section">
        <div class="container">
            <div class="profile-grid">
                <div class="profile-card">
                    <h2>Profile Information</h2>
                    <div class="profile-info">
                        <div class="info-item">
                            <label>Name:</label>
                            <span id="displayName"></span>
                        </div>
                        <div class="info-item">
                            <label>Email:</label>
                            <span id="displayEmail"></span>
                        </div>
                        <div class="info-item">
                            <label>Location:</label>
                            <span id="displayLocation"></span>
                        </div>
                        <div class="info-item">
                            <label>Bio:</label>
                            <span id="displayBio"></span>
                        </div>
                        <div class="info-item">
                            <label>Reputation:</label>
                            <span id="displayReputation" class="reputation-badge">0.0</span>
                        </div>
                        <div class="info-item">
                            <label>Total Ratings:</label>
                            <span id="displayRatings">0</span>
                        </div>
                    </div>
                </div>

                <div class="profile-card">
                    <h2>Update Profile</h2>
                    <form id="updateProfileForm">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" name="location">
                        </div>

                        <div class="form-group">
                            <label for="bio">Bio</label>
                            <textarea id="bio" name="bio" rows="4"></textarea>
                        </div>

                        <div id="errorMessage" class="error-message"></div>
                        <div id="successMessage" class="success-message"></div>

                        <button type="submit" class="btn-primary">Update Profile</button>
                    </form>
                </div>

                <div class="profile-card full-width">
                    <h2>My Ratings & Reviews</h2>
                    <div id="ratingsContainer" class="ratings-container">
                        <p class="empty-state">No ratings yet</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
